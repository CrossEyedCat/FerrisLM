name = "small"
vocab_size = 32000
hidden_dim = 1024
num_layers = 24
num_heads = 16
head_dim = 64
kv_compression_dim = 512
query_compression_dim = 1024
rope_head_dim = 32
compress_queries = false
num_shared_experts = 2
num_routed_experts = 16
num_experts_per_token = 4
expert_intermediate_dim = 2816
moe_aux_loss_alpha = 0.003
weight_init_std = 0.006
rms_norm_eps = 1e-6
