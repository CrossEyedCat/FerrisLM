tie_word_embeddings = true

[training]
batch_size = 2
seq_len = 512
learning_rate = 4.2e-4
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
warmup_steps = 2000
grad_clip = 1.0
total_steps = 50000
checkpoint_every = 5000
