name = "wikitext_micro_long"
vocab_size = 32000
hidden_dim = 128
num_layers = 2
num_heads = 4
head_dim = 32
kv_compression_dim = 64
query_compression_dim = 128
rope_head_dim = 16
compress_queries = false
num_shared_experts = 1
num_routed_experts = 4
num_experts_per_token = 2
expert_intermediate_dim = 256
moe_aux_loss_alpha = 0.003
weight_init_std = 0.006
rms_norm_eps = 1e-6
max_seq_len = 256
tie_word_embeddings = true

[training]
batch_size = 4
seq_len = 64
learning_rate = 3.0e-4
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
warmup_steps = 1000
grad_clip = 1.0
total_steps = 50000
checkpoint_every = 1000
