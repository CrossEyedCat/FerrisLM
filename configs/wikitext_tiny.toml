name = "wikitext_tiny"
vocab_size = 32000
hidden_dim = 768
num_layers = 12
num_heads = 12
head_dim = 64
kv_compression_dim = 256
query_compression_dim = 768
rope_head_dim = 32
compress_queries = false
num_shared_experts = 2
num_routed_experts = 8
num_experts_per_token = 2
expert_intermediate_dim = 2048
moe_aux_loss_alpha = 0.003
weight_init_std = 0.006
rms_norm_eps = 1e-6
max_seq_len = 512
tie_word_embeddings = true

[training]
batch_size = 2
seq_len = 128
learning_rate = 3.0e-4
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
warmup_steps = 200
grad_clip = 1.0
total_steps = 500
checkpoint_every = 100
